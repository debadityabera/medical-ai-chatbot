<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Medical AI Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* Main Container */
.app {
  width: 100%;
  max-width: 1100px;
  height: 95vh;
  display: flex;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: rgba(0,0,0,0.25);
  padding: 20px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 20px;
  font-weight: 600;
}

.new-chat {
  background: linear-gradient(90deg, #3b82f6, #6366f1);
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  margin-bottom: 20px;
}

.new-chat:hover {
  opacity: 0.85;
}

.history {
  flex: 1;
  overflow-y: auto;
  opacity: 0.6;
  font-size: 14px;
}

/* Main Chat */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 18px;
  text-align: center;
  font-weight: 600;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
}

/* Chat Area */
.chat-container {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.message {
  max-width: 70%;
  padding: 14px 18px;
  border-radius: 18px;
  line-height: 1.5;
  font-size: 14px;
  animation: fadeIn 0.2s ease-in-out;
}

.user {
  background: linear-gradient(90deg, #3b82f6, #6366f1);
  align-self: flex-end;
  border-bottom-right-radius: 6px;
}

.bot {
  background: rgba(255,255,255,0.08);
  align-self: flex-start;
  border-bottom-left-radius: 6px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(6px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Input Area */
.input-area {
  padding: 18px;
  border-top: 1px solid rgba(255,255,255,0.1);
  display: flex;
  gap: 12px;
  background: rgba(255,255,255,0.03);
}

.input-area input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 14px;
}

.input-area button {
  padding: 0 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: linear-gradient(90deg, #3b82f6, #6366f1);
  color: white;
  font-weight: 500;
  transition: 0.3s;
}

.input-area button:hover {
  opacity: 0.85;
}

/* Mobile */
@media (max-width: 900px) {
  .sidebar {
    display: none;
  }

  .app {
    height: 100vh;
    border-radius: 0;
  }

  .message {
    max-width: 85%;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h2>Medical AI Pro</h2>
    <div class="new-chat" onclick="newChat()">+ New Chat</div>
    <div class="history">No previous chats</div>
  </div>

  <div class="main">
    <div class="header">AI Medical Assistant</div>

    <div class="chat-container" id="chat"></div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Ask your health question..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("messageInput");

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.classList.add("message", type);
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function newChat() {
  chat.innerHTML = "";
}

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const typing = document.createElement("div");
  typing.classList.add("message", "bot");
  typing.innerText = "Typing...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message })
    });

    const data = await response.json();
    typing.remove();
    addMessage(data.reply, "bot");

  } catch (error) {
    typing.remove();
    addMessage("Server error. Try again.", "bot");
  }
}

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
