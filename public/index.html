<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background: linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#111827);
  background-size:400% 400%;
  animation: gradientMove 12s ease infinite;
  color:white;
  display:flex;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Sidebar */
.sidebar{
  width:280px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,0.1);
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.logo{
  font-size:20px;
  font-weight:700;
  letter-spacing:1px;
}

.new-chat{
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#3b82f6,#8b5cf6);
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.new-chat:hover{
  transform:scale(1.03);
}

/* Chat Section */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  position:relative;
}

.chat-container{
  flex:1;
  overflow-y:auto;
  padding:40px 80px;
  display:flex;
  flex-direction:column;
  gap:25px;
}

.message{
  max-width:800px;
  padding:18px 24px;
  border-radius:20px;
  line-height:1.6;
  font-size:16px;
  animation:fadeIn 0.3s ease;
}

.user{
  align-self:flex-end;
  background:linear-gradient(45deg,#2563eb,#7c3aed);
}

.bot{
  align-self:flex-start;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* Input Section */
.input-area{
  padding:25px 60px;
  border-top:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
}

.input-box{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.08);
  border-radius:50px;
  padding:12px 20px;
  transition:0.3s;
}

.input-box:focus-within{
  box-shadow:0 0 0 2px #6366f1;
}

input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:16px;
}

.send-btn{
  background:linear-gradient(45deg,#22c55e,#06b6d4);
  border:none;
  padding:10px 18px;
  border-radius:50px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.send-btn:hover{
  transform:scale(1.05);
}

.typing{
  opacity:0.6;
  font-style:italic;
}

/* Suggestions */
.suggestions{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.suggestion-card{
  background:rgba(255,255,255,0.07);
  padding:12px 18px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
  font-size:14px;
}

.suggestion-card:hover{
  background:rgba(255,255,255,0.15);
}

/* Scrollbar */
.chat-container::-webkit-scrollbar{
  width:6px;
}
.chat-container::-webkit-scrollbar-thumb{
  background:#6366f1;
  border-radius:10px;
}

/* Responsive */
@media(max-width:900px){
  .sidebar{display:none;}
  .chat-container{padding:20px;}
  .input-area{padding:20px;}
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">🏥 MED AI</div>
  <button class="new-chat" onclick="newChat()">+ New Chat</button>
</div>

<div class="main">

  <div class="chat-container" id="chat">
    
    <div class="suggestions">
      <div class="suggestion-card" onclick="quickAsk('What are symptoms of diabetes?')">
        Symptoms of diabetes
      </div>
      <div class="suggestion-card" onclick="quickAsk('How to reduce high blood pressure?')">
        Reduce high BP
      </div>
      <div class="suggestion-card" onclick="quickAsk('Is paracetamol safe daily?')">
        Paracetamol safety
      </div>
    </div>

  </div>

  <div class="input-area">
    <div class="input-box">
      <input type="text" id="message" placeholder="Ask anything about health..." />
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("message");

input.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

function addMessage(text,type){
  const div=document.createElement("div");
  div.classList.add("message",type);
  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function quickAsk(text){
  input.value=text;
  sendMessage();
}

async function sendMessage(){
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const typing=document.createElement("div");
  typing.classList.add("message","bot","typing");
  typing.innerText="AI is analyzing...";
  chat.appendChild(typing);

  const res=await fetch("/chat",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  const data=await res.json();
  typing.remove();
  streamText(data.reply);
}

function streamText(text){
  let index=0;
  const div=document.createElement("div");
  div.classList.add("message","bot");
  chat.appendChild(div);

  const interval=setInterval(()=>{
    div.innerHTML=text.slice(0,index);
    index++;
    chat.scrollTop=chat.scrollHeight;
    if(index>text.length) clearInterval(interval);
  },6);
}

function newChat(){
  chat.innerHTML="";
}
</script>

</body>
</html>
