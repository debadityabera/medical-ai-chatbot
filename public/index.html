<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Medical AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0f172a;
  color: white;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #111827;
  padding: 20px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #1f2937;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 20px;
}

.new-chat {
  background: #2563eb;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  text-align: center;
  margin-bottom: 20px;
  transition: 0.2s;
}

.new-chat:hover {
  background: #1d4ed8;
}

.chat-history {
  flex: 1;
  overflow-y: auto;
  font-size: 14px;
  opacity: 0.7;
}

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 15px;
  background: #111827;
  border-bottom: 1px solid #1f2937;
  text-align: center;
  font-weight: 500;
}

/* Chat area */
.chat-container {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.message {
  max-width: 70%;
  margin-bottom: 15px;
  padding: 12px 16px;
  border-radius: 14px;
  animation: fadeIn 0.2s ease-in-out;
}

.user {
  background: #2563eb;
  align-self: flex-end;
  margin-left: auto;
}

.bot {
  background: #1f2937;
  align-self: flex-start;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(5px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Input */
.input-area {
  padding: 15px;
  border-top: 1px solid #1f2937;
  display: flex;
  gap: 10px;
  background: #111827;
}

.input-area input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1f2937;
  color: white;
}

.input-area button {
  background: #2563eb;
  border: none;
  padding: 0 18px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.input-area button:hover {
  background: #1d4ed8;
}

/* Mobile */
@media (max-width: 768px) {
  .sidebar {
    display: none;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Medical AI</h2>
  <div class="new-chat" onclick="newChat()">+ New Chat</div>
  <div class="chat-history">No previous chats</div>
</div>

<div class="main">
  <div class="header">Medical AI Assistant</div>

  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Ask anything about health..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("messageInput");

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.classList.add("message", type);
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function newChat() {
  chat.innerHTML = "";
}

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const typing = document.createElement("div");
  typing.classList.add("message", "bot");
  typing.innerText = "Typing...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message })
    });

    const data = await response.json();
    typing.remove();
    addMessage(data.reply, "bot");

  } catch (error) {
    typing.remove();
    addMessage("Server error. Try again.", "bot");
  }
}

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});
</script>

</body>
</html>
